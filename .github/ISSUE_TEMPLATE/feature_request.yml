name: Feature request
description: Suggest a feature or compatibility improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the requested feature without sharing secrets, private API documents, proprietary SDK content, or personal data.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you expect.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - RustDesk client API compatibility
        - Admin frontend
        - OAuth / OIDC
        - Docker / OpenWrt deployment
        - Documentation
        - Security / privacy
        - Compliance / licensing
        - Other
    validations:
      required: true
  - type: checkboxes
    id: compliance
    attributes:
      label: Compliance checklist
      options:
        - label: This request does not require copying proprietary code, private SDKs, or incompatible licensed material.
          required: true
        - label: This request does not imply official affiliation with RustDesk, Huawei, HarmonyOS, OpenHarmony, or another vendor.
          required: true
