name: 构建并发布版本
run-name: 发布构建（${{ github.ref_name || github.sha }}）

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'
          cache: false

      - name: 提取标签
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 安装构建依赖
        run: |
          sudo apt update
          sudo apt install make zip -y
          cd soybean-admin && pnpm install --frozen-lockfile
      
      - name: 编译项目
        env:
          VITE_APP_VERSION: ${{ steps.tag.outputs.tag_name || github.ref_name }}
        run: |
          go env -w GOOS=${{matrix.os}}
          go env -w GOARCH=${{matrix.arch}}
          go build -C backend -o ../build/
          cd soybean-admin && pnpm build 
          cd .. && cp -R soybean-admin/dist build/
          cp backend/server.yaml build/

      - name: 打包文件
        run: |
          zip -r ${{matrix.os}}-${{matrix.arch}}.zip build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{matrix.os}}-${{matrix.arch}}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 创建发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: RustDesk API 1.4.7 兼容更新（${{ needs.build.outputs.tag_name }}）
          generate_release_notes: false
          body: |
            本次发布已重新生成 RustDesk API 兼容更新包。

            主要内容：
            - RustDesk 客户端兼容目标更新为 1.4.7，服务端兼容标识同步刷新。
            - 补齐 RustDesk 1.4.7 设备部署接口兼容响应，避免新版客户端请求 `/api/devices/deploy` 时出现 404。
            - 管理后台“服务器连接配置”新增配置二维码，方便手机 App 扫码导入。
            - 生成 Linux、Windows、macOS 的 amd64 和 arm64 部署包。
            - Docker 镜像发布工作流会同步推送 GHCR `latest`、版本标签和 sha 标签。

            升级提示：
            - 请同时替换后端程序和管理后台 dist 静态资源，并重启服务。
            - 浏览器仍显示旧更新日志或旧按钮时，请强制刷新页面或清理缓存后再确认。
          files: release-assets/*.zip
