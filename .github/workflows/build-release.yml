on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup go env
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'
          cache: false

      - name: get tag
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: install
        run: |
          sudo apt update
          sudo apt install make zip -y
          cd soybean-admin && pnpm install --frozen-lockfile
      
      - name: build
        run: |
          go env -w GOOS=${{matrix.os}}
          go env -w GOARCH=${{matrix.arch}}
          go build -C backend -o ../build/
          cd soybean-admin && pnpm build 
          cd .. && cp -R soybean-admin/dist build/
          cp backend/server.yaml build/

      - name: pack files
        run: |
          zip ${{matrix.os}}-${{matrix.arch}}.zip build/*

      - name: upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{matrix.os}}-${{matrix.arch}}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          generate_release_notes: true
          files: release-assets/*.zip
