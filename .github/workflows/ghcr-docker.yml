name: 构建 Docker 镜像
run-name: 构建 Docker 镜像：${{ github.ref_name }}

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:
    inputs:
      push_image:
        description: "推送镜像到 GHCR（需要 Package 写入权限）"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  PUSH_IMAGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'true' }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建镜像（linux/amd64）
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUSH_IMAGE == 'true' }}
          load: ${{ env.PUSH_IMAGE != 'true' }}
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:latest
            ghcr.io/${{ github.repository_owner }}/rustdesk-api-server-pro:sha-${{ github.sha }}


