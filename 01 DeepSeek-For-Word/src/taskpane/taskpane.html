<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <title>DeepSeek for Word</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="./taskpane.css">
</head>
<body>
    <div id="content">
        <!-- API密钥设置区域 -->
        <div class="settings-section">
            <div class="settings-header">
                <h3>🔑 API设置</h3>
                <span id="key-status-text" class="key-status">未设置</span>
            </div>
            <div class="api-key-container">
                <input type="password" id="api-key-input" placeholder="输入DeepSeek API密钥 (sk-开头)" />
                <button id="toggle-key-visibility" class="icon-btn">🔓</button>
            </div>
            <div class="key-actions">
                <button id="save-key-btn">保存密钥</button>
                <button id="clear-key-btn" class="secondary-btn">清除</button>
            </div>
        </div>

        <h2>🤖 DeepSeek AI助手</h2>
        
        <div class="input-section">
            <textarea id="prompt-input" placeholder="请输入您的需求...例如：帮我写一篇关于视觉引导的论文，要求图文并茂"></textarea>
            <div class="generate-row">
                <button id="generate-btn" disabled>生成内容</button>
                <button id="preview-format-btn" class="secondary-btn">预览格式</button>
            </div>
        </div>
        
        <!-- 功能按钮区域 - 2列布局 -->
        <div class="actions">
            <div class="actions-row">
                <button id="rewrite-btn" disabled>重写选中文本</button>
                <button id="summarize-btn" disabled>总结文档</button>
            </div>
            <div class="actions-row">
                <button id="translate-btn" disabled>翻译选中文本</button>
                <button id="translate-full-btn" disabled>翻译全文</button>
            </div>
        </div>

        <!-- 翻译选项 -->
        <div class="translation-options">
            <div class="translation-header">
                <h3>🌍 翻译选项</h3>
                <div class="language-selector">
                    <select id="target-language">
                        <option value="zh">中文</option>
                        <option value="en">英语</option>
                        <option value="ja">日语</option>
                        <option value="ko">韩语</option>
                        <option value="fr">法语</option>
                        <option value="de">德语</option>
                        <option value="es">西班牙语</option>
                        <option value="ru">俄语</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 格式预览区域 -->
        <div id="format-preview" class="format-preview" style="display: none;"></div>
        
        <div id="result" class="result-area"></div>
    </div>
    
    <script src="./taskpane.js"></script>
</body>
</html>
